name: Build releases

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Select the build device'
        required: true
        default: 'x86_64'
        type: choice
        options:
          - 'friendlyarm_nanopi-r2c'
          - 'friendlyarm_nanopi-r2c-plus'
          - 'friendlyarm_nanopi-r2s'
          - 'friendlyarm_nanopi-r3s'
          - 'friendlyarm_nanopi-r4s'
          - 'friendlyarm_nanopi-r5c'
          - 'friendlyarm_nanopi-r5s'
          - 'friendlyarm_nanopi-r6c'
          - 'friendlyarm_nanopi-r6s'
          - 'friendlyarm_nanopi-r76s'
          - 'hinlink_h28k'
          - 'linkease_easepi-r1'
          - 'lunzn_fastrhino-r66s'
          - 'x86_64'
      version:
        description: 'Select the build version'
        required: true
        default: '25.12.4'
        type: choice
        options:
          - 'v24.10.7'
          - 'v25.12.4'
      lan_addr:
        description: 'Setting default LAN address'
        required: true
        default: '10.0.0.1'
        type: string
      root_password:
        description: 'Setting default root password (Optional, No password by default)'
        required: false
        default: 'ppassword'
        type: string

jobs:
  build:
    name: Build ${{ github.event.inputs.device }}
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash

    steps:
      - name: 📥 检出仓库代码
        continue-on-error: true
        uses: actions/checkout@main
        with:
          path: openwrt-actions-imagebuilder

      - name: ⚙️ 初始化编译环境
        run: |
          sudo timedatectl set-timezone 'Asia/Shanghai'
          git config --global user.name 'actions'
          git config --global user.email 'action@github.com'
          echo build_dir="/builder" >> "$GITHUB_ENV"
          version="${{ github.event.inputs.version }}"
          echo "version=${version#v}" >> "$GITHUB_ENV"

      - name: 📊 显示编译环境信息
        run: |
          echo -e "\n\033[1;32m🖥️ CPU 信息\033[0m"
          echo "型号：$(awk -F': ' '/model name/ {print $2; exit}' /proc/cpuinfo)"
          echo "频率：$(awk -F': ' '/cpu MHz/ {printf "%.0f MHz", $2; exit}' /proc/cpuinfo)"
          echo "核心：$(nproc) 核"

          echo -e "\n\033[1;32m💾 内存使用情况\033[0m"
          free -h

          echo -e "\n\033[1;32m📦 存储空间\033[0m"
          df -hT / /mnt

          echo -e "\n\033[1;32m🐧 系统信息\033[0m"
          lsb_release -ds
          uname -srmo

      - name: 📦 安装 Caddy 服务器
        run: |
          sudo curl -sL -o /usr/bin/caddy https://github.com/MomoFlora/openwrt-actions-imagebuilder/releases/download/caddy/caddy-amd64
          sudo chmod 755 /usr/bin/caddy
          echo ":8080 {" > caddyfile
          echo "    root * $(pwd)/openwrt-actions-imagebuilder" >> caddyfile
          echo "    file_server browse" >> caddyfile
          echo "}" >> caddyfile
          sudo /usr/bin/caddy start --config caddyfile --adapter caddyfile

      - name: 🗑️ 释放磁盘空间
        uses: MomoFlora/actions@free-disk
        with:
          build-mount-path: /builder

      - name: 🛠️ 配置编译环境
        uses: MomoFlora/actions@imagebuilder-build-setup

      - name: 📂 获取并解压 Image Builder
        working-directory: /builder
        id: imagebuilder
        run: |
          echo -e "\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 获取并解压 Image Builder"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          device="${{ github.event.inputs.device }}"

          echo "📱 当前设备: $device"

          case "$device" in
            x86_64)
              target="x86-64"
              echo "🖥️ 架构类型: x86_64 (通用 PC / 虚拟机)"
              ;;
            friendlyarm_nanopi-r2c|\
            friendlyarm_nanopi-r2c-plus|\
            friendlyarm_nanopi-r2s|\
            friendlyarm_nanopi-r3s|\
            friendlyarm_nanopi-r4s|\
            friendlyarm_nanopi-r5c|\
            friendlyarm_nanopi-r5s|\
            friendlyarm_nanopi-r6c|\
            friendlyarm_nanopi-r6s|\
            friendlyarm_nanopi-r76s|\
            hinlink_h28k|\
            linkease_easepi-r1|\
            lunzn_fastrhino-r66s)
              target="rockchip-armv8"
              echo "🧠 架构类型: Rockchip ARMv8"
              ;;
            *)
              echo "❌ 未支持的设备: $device"
              exit 1
              ;;
          esac

          imagebuilder="openwrt-imagebuilder-$version-$target.Linux-x86_64.tar.zst"

          echo ""
          echo "🔗 下载地址:"
          echo "   https://github.com/MomoFlora/openwrt-actions-imagebuilder/releases/download/imagebuilder/$imagebuilder"

          echo ""
          echo "⬇️ 正在下载 Image Builder..."
          curl -fL# -o "$imagebuilder" \
            "https://github.com/MomoFlora/openwrt-actions-imagebuilder/releases/download/imagebuilder/$imagebuilder"

          echo ""
          echo "📏 压缩包大小:"
          du -h "$imagebuilder"

          echo ""
          echo "📁 创建工作目录..."
          mkdir -p openwrt

          echo "📦 正在解压 Image Builder..."
          tar --zstd -xf "$imagebuilder" \
            --strip-components=1 \
            -C openwrt

          echo ""
          echo "🗑️ 清理压缩包..."
          rm -f "$imagebuilder"

          echo ""
          echo "📋 openwrt 目录内容:"
          find openwrt -maxdepth 1 -mindepth 1 -printf '   📄 %f\n'

          echo ""
          echo "🗂️ Image Builder 目录: openwrt"

          echo "imagebuilder_dir=openwrt" >> "$GITHUB_OUTPUT"

          {
            echo "## 📦 Image Builder 信息"
            echo ""
            echo "| 项目 | 信息 |"
            echo "| --- | --- |"
            echo "| 📱 设备 | $device |"
            echo "| 🧠 架构 | $target |"
            echo "| 🏷️ 版本 | $version |"
            echo "| 📂 工作目录 | /builder/openwrt |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Image Builder 准备完成"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
